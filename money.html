<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>沖繩 2026 姊妹刷卡神戰記</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f3f4f6; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .kumamon-red { background-color: #e60012; }
        .kumamon-black { background-color: #000000; }
        .pluspay-blue { background-color: #0052cc; }
        .progress-bar { transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        select { font-size: 18px !important; padding: 16px !important; }
        input { font-size: 20px !important; }
        
        .suggestion-pulse {
            animation: pulse 2s infinite;
            border-width: 3px;
        }
        @keyframes pulse {
            0% { border-color: #fbbf24; box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
            70% { border-color: #f59e0b; box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); }
            100% { border-color: #fbbf24; box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }
    </style>
</head>
<body class="pb-32">

    <!-- Header & Total Spent -->
    <header class="kumamon-black text-white py-6 shadow-xl sticky top-0 z-50 text-center">
        <h1 class="text-2xl font-black italic tracking-[0.2em]">OKINAWA 2026</h1>
        <div class="mt-2 flex flex-col items-center">
            <div id="current-date-display" class="text-[10px] bg-red-600 px-4 py-1 rounded-full font-bold uppercase tracking-widest mb-2"></div>
            <div class="bg-white/10 px-6 py-2 rounded-2xl border border-white/20">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">全家總支出 (JPY)</p>
                <p id="total-jpy-spent" class="text-3xl font-black text-white font-mono">0</p>
            </div>
        </div>
    </header>

    <main class="p-4 space-y-6">
        
        <!-- 即時推薦區 (Dynamic Advice) -->
        <div id="live-advice" class="bg-white rounded-3xl p-6 shadow-lg border-2 suggestion-pulse min-h-[120px] flex flex-col justify-center">
            <h2 class="text-amber-600 text-sm font-black uppercase tracking-widest mb-2 flex items-center">
                <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> 最佳刷卡選擇
            </h2>
            <div id="advice-text" class="text-2xl font-black text-gray-900 leading-snug">
                請輸入消費...
            </div>
            <div id="paypay-warning" class="hidden mt-2 text-red-600 font-bold text-sm bg-red-50 p-2 rounded-lg border border-red-200">
                <i class="fa-solid fa-triangle-exclamation mr-1"></i> 單筆超額！建議拆單結帳 (每單 < 857 元)
            </div>
        </div>

        <!-- 快速輸入表單 -->
        <section class="bg-white rounded-[2.5rem] p-8 shadow-xl space-y-6 border border-gray-100">
            <div class="space-y-5">
                <!-- 商店下拉 -->
                <div>
                    <label class="text-sm font-black text-gray-400 mb-2 block ml-1">📍 商店</label>
                    <select id="input-store" onchange="handleStoreChange()" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl font-bold text-gray-800 focus:border-red-500 focus:bg-white transition-all">
                        <option value="" disabled selected>點此選擇店家</option>
                        <optgroup label="🚗 交通租車">
                            <option value="OTS租車">OTS 租車 (特店)</option>
                        </optgroup>
                        <optgroup label="🛍️ 購物/藥妝/家電">
                            <option value="BicCamera">BicCamera (特店)</option>
                            <option value="Yodobashi">Yodobashi (特店)</option>
                            <option value="松本清">松本清 (特店)</option>
                            <option value="唐吉軻德">唐吉軻德 (特店)</option>
                            <option value="大國藥妝">大國藥妝 (特店)</option>
                            <option value="無印良品">無印良品 (特店)</option>
                            <option value="UNIQLO">UNIQLO (特店)</option>
                            <option value="GU">GU (特店)</option>
                            <option value="三井購物園區">三井 MITSUI (特店)</option>
                        </optgroup>
                        <optgroup label="🍣 美食饗宴">
                            <option value="敘敘苑">敘敘苑 (特店)</option>
                            <option value="勝烈亭">勝烈亭 (特店)</option>
                            <option value="一蘭拉麵">一蘭拉麵 (特店)</option>
                            <option value="壽司郎">壽司郎 (特店)</option>
                            <option value="藏壽司">藏壽司 (特店)</option>
                            <option value="鳥貴族">鳥貴族 (特店)</option>
                            <option value="Shake Shack">Shake Shack (特店)</option>
                        </optgroup>
                        <optgroup label="其他">
                            <option value="一般消費">一般店家 (無加碼)</option>
                            <option value="PayPay消費">PayPay/全支付 (掃碼)</option>
                        </optgroup>
                    </select>
                </div>

                <!-- 金額 -->
                <div>
                    <label class="text-sm font-black text-gray-400 mb-2 block ml-1">💰 日幣金額 (JPY)</label>
                    <input type="number" id="input-jpy" placeholder="0" 
                           oninput="updateLiveAdvice()"
                           class="w-full p-5 bg-gray-50 border-2 border-gray-100 rounded-2xl text-3xl font-mono font-black text-red-600 focus:bg-white focus:border-red-500 transition-all outline-none">
                </div>

                <input type="hidden" id="input-type" value="general">

                <!-- 最終執行人 -->
                <div>
                    <label class="text-sm font-black text-gray-400 mb-2 block ml-1">👤 實際執行人</label>
                    <select id="input-member" class="w-full bg-red-50 border-2 border-red-200 rounded-2xl font-black text-red-600 text-xl">
                        <option value="mom">媽媽 (0.2040)</option>
                        <option value="chu1">朱一 (0.2039)</option>
                        <option value="chu2">朱二 (0.2040)</option>
                        <option value="chu3">朱三 (0.1992)</option>
                    </select>
                </div>
            </div>

            <button id="add-btn" onclick="addTransaction()" class="w-full kumamon-red text-white font-black py-6 rounded-2xl shadow-2xl active:scale-95 transition-all text-2xl tracking-[0.2em]">
                確認入帳 🐻
            </button>
        </section>

        <!-- 進度條區 -->
        <section class="space-y-4">
            <h3 class="font-black text-gray-800 flex justify-between items-center px-2 text-lg">
                <span><i class="fa-solid fa-chart-pie mr-2 text-red-500"></i>姊妹額度進度</span>
            </h3>
            <div id="member-stats" class="space-y-6">
                <!-- JS 動態渲染 -->
            </div>
        </section>

        <!-- 完整記帳明細 -->
        <section class="space-y-4">
            <div class="flex justify-between items-center px-2">
                <h3 class="font-black text-gray-800 text-lg">
                    <i class="fa-solid fa-receipt mr-2 text-gray-500"></i>消費明細
                </h3>
                <button onclick="copyCSV()" class="text-[10px] font-bold bg-gray-200 px-3 py-1 rounded-full text-gray-600 active:bg-gray-300">
                    <i class="fa-solid fa-copy mr-1"></i> 複製 CSV
                </button>
            </div>
            <div id="history-list" class="space-y-4 pb-10">
                <!-- 完整明細 -->
            </div>
        </section>

    </main>

    <!-- Footer Nav -->
    <nav class="fixed bottom-0 w-full bg-white/90 backdrop-blur-xl border-t border-gray-200 p-5 flex justify-around items-center z-50 shadow-2xl">
        <button class="text-red-600 text-2xl"><i class="fa-solid fa-house"></i></button>
        <button id="gas-btn" class="text-gray-300 text-2xl" onclick="setGasUrl()"><i class="fa-solid fa-link"></i></button>
        <button class="text-gray-300 text-2xl" onclick="resetData()"><i class="fa-solid fa-trash-can"></i></button>
    </nav>

    <script>
        // 設定預設的 GAS URL
        const DEFAULT_GAS_URL = "https://script.google.com/macros/s/AKfycbyKnFTlKYAYD6Zjs1y5Q3UKsGtbp4Ggd8Z6zkBiCUewjsiT0j9h4Qkr0BnC8yk4DNuq/exec";

        const config = {
            esun_cap_twd: 8333,
            jcb_threshold_jpy: 100000,
            paypay_cap_twd: 3428,
            paypay_single_limit_twd: 857,
            realtime_rate: 0.21,
            members: {
                mom: { name: '媽媽', rate: 0.2040, spentTWD: 0, jcbSpentJPY: 0, paypaySpentTWD: 0, priority: 1 },
                chu1: { name: '朱一', rate: 0.2039, spentTWD: 0, jcbSpentJPY: 0, paypaySpentTWD: 0, priority: 2 },
                chu2: { name: '朱二', rate: 0.2040, spentTWD: 0, jcbSpentJPY: 0, paypaySpentTWD: 0, priority: 3 },
                chu3: { name: '朱三', rate: 0.1992, spentTWD: 0, jcbSpentJPY: 0, paypaySpentTWD: 0, priority: 4 }
            }
        };

        let transactions = JSON.parse(localStorage.getItem('okinawa_tx')) || [];
        // 若 localStorage 沒存過 URL，則使用預設值
        let gasUrl = localStorage.getItem('okinawa_gas_url') || DEFAULT_GAS_URL;
        const simDate = new Date(); 

        function init() {
            document.getElementById('current-date-display').innerText = simDate.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric', weekday: 'short' });
            if (gasUrl) {
                document.getElementById('gas-btn').classList.replace('text-gray-300', 'text-blue-500');
            }
            calculateStats();
            updateUI();
            updateLiveAdvice();
        }

        function setGasUrl() {
            const url = prompt("請輸入 Google Apps Script URL (目前已預設):", gasUrl);
            if (url !== null && url !== "") {
                gasUrl = url;
                localStorage.setItem('okinawa_gas_url', url);
                document.getElementById('gas-btn').classList.replace('text-gray-300', 'text-blue-500');
                alert("GAS URL 已更新！");
            }
        }

        function handleStoreChange() {
            const store = document.getElementById('input-store').value;
            const typeInput = document.getElementById('input-type');
            if (store === '一般消費') {
                typeInput.value = 'general';
            } else if (store === 'PayPay消費') {
                typeInput.value = 'paypay';
            } else {
                typeInput.value = 'special';
            }
            updateLiveAdvice();
        }

        function calculateStats() {
            let totalJPY = 0;
            Object.keys(config.members).forEach(m => {
                config.members[m].spentTWD = 0;
                config.members[m].jcbSpentJPY = 0;
                config.members[m].paypaySpentTWD = 0;
            });

            transactions.forEach(tx => {
                const m = config.members[tx.member];
                const date = new Date(tx.date);
                totalJPY += tx.amountJPY;
                if (tx.type === 'special') m.spentTWD += tx.amountJPY * m.rate;
                if (tx.type === 'paypay') m.paypaySpentTWD += tx.amountJPY * config.realtime_rate;
                if (date >= new Date('2026-02-01') && tx.type !== 'paypay') m.jcbSpentJPY += tx.amountJPY;
            });
            document.getElementById('total-jpy-spent').innerText = Math.round(totalJPY).toLocaleString();
        }

        function updateLiveAdvice() {
            const store = document.getElementById('input-store').value;
            const amountJPY = parseFloat(document.getElementById('input-jpy').value) || 0;
            const type = document.getElementById('input-type').value;
            const adviceEl = document.getElementById('advice-text');
            const warningEl = document.getElementById('paypay-warning');
            const memberSelect = document.getElementById('input-member');
            
            const isFeb = simDate >= new Date('2026-02-01');
            warningEl.classList.add('hidden');

            if (!store) {
                adviceEl.innerHTML = "等待輸入...";
                return;
            }

            if (type === 'paypay') {
                const currentTWD = amountJPY * config.realtime_rate;
                if (currentTWD > config.paypay_single_limit_twd) warningEl.classList.remove('hidden');
                
                const sortedPay = Object.keys(config.members).sort((a,b) => config.members[a].priority - config.members[b].priority);
                let recommended = sortedPay.find(k => config.members[k].paypaySpentTWD < config.paypay_cap_twd) || 'mom';
                
                adviceEl.innerHTML = `💸 全民 PayPay<br>請用 <span class="text-blue-600">${config.members[recommended].name}</span>`;
                memberSelect.value = recommended;
                return;
            }

            if (!isFeb) {
                const sortedKeys = Object.keys(config.members).sort((a, b) => {
                    const quotaA = config.esun_cap_twd - config.members[a].spentTWD;
                    const quotaB = config.esun_cap_twd - config.members[b].spentTWD;
                    if (Math.abs(quotaA - quotaB) > 1) return quotaB - quotaA;
                    return config.members[a].priority - config.members[b].priority;
                });

                let recommended = sortedKeys.find(k => config.members[k].spentTWD < config.esun_cap_twd) || 'chu3';
                if (type === 'special') {
                    adviceEl.innerHTML = `🐻 熊本熊 8.5%<br>請用 <span class="text-red-600">${config.members[recommended].name}</span>`;
                } else {
                    adviceEl.innerHTML = `🛍️ 一般店無加碼<br>用匯率王 <span class="text-green-600">朱三 (0.1992)</span>`;
                    recommended = 'chu3';
                }
                memberSelect.value = recommended;
            } else {
                const sorted = Object.keys(config.members).sort((a,b) => {
                    if (config.members[b].jcbSpentJPY !== config.members[a].jcbSpentJPY) return config.members[b].jcbSpentJPY - config.members[a].jcbSpentJPY;
                    return config.members[a].priority - config.members[b].priority;
                });
                let recommended = sorted.find(k => config.members[k].jcbSpentJPY < config.jcb_threshold_jpy) || sorted[0];
                adviceEl.innerHTML = `🚀 JCB 10% 任務<br>請用 <span class="text-indigo-600">${config.members[recommended].name}</span>`;
                memberSelect.value = recommended;
            }
        }

        async function addTransaction() {
            const store = document.getElementById('input-store').value;
            const jpy = parseFloat(document.getElementById('input-jpy').value);
            const member = document.getElementById('input-member').value;
            const type = document.getElementById('input-type').value;

            if (!store || !jpy) return;

            const btn = document.getElementById('add-btn');
            btn.disabled = true;
            btn.innerText = "同步中...";

            const newTx = {
                id: Date.now(),
                date: simDate.toISOString(),
                store: store,
                amountJPY: jpy,
                member: member,
                type: type,
                synced: false
            };

            // 1. 先存本地
            transactions.push(newTx);
            localStorage.setItem('okinawa_tx', JSON.stringify(transactions));

            // 2. 嘗試同步到 GAS
            if (gasUrl) {
                try {
                    await fetch(gasUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(newTx),
                        headers: { 'Content-Type': 'application/json' }
                    });
                    newTx.synced = true;
                    // 更新本地狀態
                    const idx = transactions.findIndex(t => t.id === newTx.id);
                    if (idx !== -1) transactions[idx].synced = true;
                    localStorage.setItem('okinawa_tx', JSON.stringify(transactions));
                } catch (e) {
                    console.error("同步失敗:", e);
                }
            }

            document.getElementById('input-jpy').value = '';
            calculateStats();
            updateUI();
            updateLiveAdvice();
            
            btn.disabled = false;
            btn.innerText = "確認入帳 🐻";
        }

        function updateUI() {
            const statsDiv = document.getElementById('member-stats');
            statsDiv.innerHTML = '';

            Object.keys(config.members).forEach(key => {
                const m = config.members[key];
                const esunProgress = Math.min((m.spentTWD / config.esun_cap_twd) * 100, 100);
                const jcbProgress = Math.min((m.jcbSpentJPY / config.jcb_threshold_jpy) * 100, 100);
                const payProgress = Math.min((m.paypaySpentTWD / config.paypay_cap_twd) * 100, 100);

                statsDiv.innerHTML += `
                    <div class="bg-white p-6 rounded-[2rem] shadow-md border border-gray-50">
                        <div class="flex justify-between items-center mb-5">
                            <span class="font-black text-2xl text-gray-900">${m.name}</span>
                            <span class="text-xs px-3 py-1 bg-gray-100 text-gray-500 rounded-full font-mono font-bold">匯率 ${key === 'chu3' ? '0.1992' : m.rate}</span>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <div class="flex justify-between text-[9px] mb-1 font-black text-red-500 uppercase tracking-widest">
                                    <span>熊本熊特店 (NT 8.3k)</span>
                                    <span>${Math.round(m.spentTWD)} / 8.3k</span>
                                </div>
                                <div class="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden">
                                    <div class="kumamon-red h-full progress-bar" style="width: ${esunProgress}%"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between text-[9px] mb-1 font-black text-blue-600 uppercase tracking-widest">
                                    <span>JCB 10% (100k)</span>
                                    <span>${Math.round(m.jcbSpentJPY).toLocaleString()} / 100k</span>
                                </div>
                                <div class="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden">
                                    <div class="bg-blue-600 h-full progress-bar" style="width: ${jcbProgress}%"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between text-[9px] mb-1 font-black text-blue-400 uppercase tracking-widest">
                                    <span>全支付每月上限</span>
                                    <span>NT$ ${Math.round(m.paypaySpentTWD)} / 3.4k</span>
                                </div>
                                <div class="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden">
                                    <div class="pluspay-blue h-full progress-bar" style="width: ${payProgress}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            const historyDiv = document.getElementById('history-list');
            if (historyDiv) {
                historyDiv.innerHTML = transactions.length === 0 ? '<p class="text-center text-gray-400 py-10 font-bold">尚無任何消費紀錄</p>' : 
                transactions.slice().reverse().map(tx => `
                    <div class="flex justify-between items-center bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                        <div class="flex flex-col">
                            <div class="flex items-center">
                                <span class="font-black text-gray-800 text-base leading-none">${tx.store}</span>
                                ${tx.synced ? '<i class="fa-solid fa-cloud text-[10px] text-blue-400 ml-2"></i>' : '<i class="fa-solid fa-cloud-slash text-[10px] text-gray-300 ml-2"></i>'}
                            </div>
                            <span class="text-[10px] text-gray-400 font-bold mt-1 uppercase">
                                ${config.members[tx.member].name} | 
                                <span class="${tx.type === 'special' ? 'text-red-500' : (tx.type === 'paypay' ? 'text-blue-500' : 'text-gray-500')}">
                                    ${tx.type === 'special' ? '熊加碼' : (tx.type === 'paypay' ? 'PayPay' : '一般')}
                                </span>
                            </span>
                            <span class="text-[8px] text-gray-300 mt-1">${new Date(tx.date).toLocaleString([], {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                        <div class="text-right">
                            <span class="font-mono font-black text-red-600 text-xl">${Math.round(tx.amountJPY).toLocaleString()}</span>
                            <span class="text-[10px] font-black text-gray-400 ml-0.5">JPY</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        function copyCSV() {
            if (transactions.length === 0) return alert('目前沒有資料可以複製');
            const header = '日期,商店,日幣金額,執行人,類型\n';
            const rows = transactions.map(tx => `${new Date(tx.date).toLocaleDateString()},${tx.store},${tx.amountJPY},${config.members[tx.member].name},${tx.type}`).join('\n');
            const csv = header + rows;
            const tempInput = document.createElement('textarea');
            tempInput.value = csv;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            alert('消費明細已轉為 CSV 並複製！');
        }

        function resetData() {
            if (confirm('確定清空？這會刪掉所有已記帳的數據喔！')) {
                transactions = [];
                localStorage.removeItem('okinawa_tx');
                init();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
