<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 沖繩 櫻花賞 隨性導航版</title>
    <!-- 設定網頁圖示 (Favicon) -->
    <link rel="icon" type="image/png" href="images/japan.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fffafb; color: #1e293b; }
        .chart-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; height: 120px; }
        .nav-tab.active { background-color: #ff4d6d; color: #ffffff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255, 77, 109, 0.3); }
        .timeline-line { position: relative; }
        .timeline-line::before { content: ''; position: absolute; left: 15px; top: 0; bottom: 0; width: 2px; background: #ffe3e8; }
        .location-link:hover { text-decoration: underline; color: #ff4d6d; }
        .sakura-tag { background: #ff4d6d; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-6 sticky top-0 z-50 shadow-xl border-b-4 border-pink-500">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-xl font-bold tracking-tight flex items-center gap-2">
                    <!-- 將原本的 🌸 換成 images/japan.png -->
                    <img src="images/japan.png" alt="Japan Icon" class="w-8 h-8 object-contain">
                    2026 沖繩櫻花賞 ‧ 隨性之旅
                </h1>
                <p class="text-pink-300 text-xs mt-1">1月下旬限定：名護櫻花祭 ‧ 今歸仁夜櫻</p>
            </div>
            <a id="daily-full-map" href="#" target="_blank" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-all shadow-lg">
                <span>🗺️</span> 導航今日櫻花路徑
            </a>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="bg-white border-b sticky top-[92px] md:top-[76px] z-40 overflow-x-auto shadow-sm">
        <div class="max-w-6xl mx-auto flex p-3 gap-2" id="day-nav"></div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-8 mt-4">
        
        <!-- Left Column: Itinerary & Food -->
        <div class="lg:col-span-2 space-y-6">
            <section class="bg-white rounded-3xl p-6 shadow-sm border border-pink-50">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <span class="text-pink-500">📍</span> 行程景點
                    </h2>
                    <span id="current-date" class="text-sm font-bold text-slate-400"></span>
                </div>
                <div id="itinerary-list" class="timeline-line space-y-8 pl-4"></div>
                <div class="mt-10 pt-6 border-t border-slate-100">
                    <button id="toggle-backup" class="text-xs font-bold text-slate-400 hover:text-pink-500 flex items-center gap-1">
                        <span>➕ 更多賞櫻/逛街備案</span>
                    </button>
                    <div id="backup-list" class="hidden mt-4 grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                </div>
            </section>

            <!-- Food Section -->
            <section class="bg-slate-900 rounded-3xl p-6 shadow-xl text-white">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                    <h2 class="text-2xl font-bold flex items-center gap-2 text-orange-400">
                        <span>🍴</span> 美食挑選
                    </h2>
                    <button onclick="pickRandomFood()" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-1.5 rounded-full text-xs font-bold transition-all flex items-center gap-2">幫我選一個</button>
                </div>
                <div id="food-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>
        </div>

        <!-- Right Column: Stats & Hotel -->
        <div class="space-y-6">
            <section class="bg-white rounded-3xl p-6 shadow-sm border border-pink-50">
                <h3 class="text-sm font-bold text-pink-400 uppercase tracking-widest mb-4">🌸 今日賞櫻指數</h3>
                <div class="chart-container">
                    <canvas id="paceChart"></canvas>
                </div>
                <p id="pace-tip" class="text-[10px] text-slate-400 mt-4 text-center leading-relaxed"></p>
            </section>

            <section class="bg-blue-600 rounded-3xl p-6 shadow-lg text-white">
                <div id="hotel-info-card"></div>
                <div class="mt-4 flex items-center gap-2 text-[10px] font-bold bg-yellow-400/20 text-yellow-100 p-2 rounded-lg">
                    <span>🕒</span> 提醒：15:00 之後方可辦理入住
                </div>
            </section>

            <section class="bg-stone-100 rounded-3xl p-6 border border-stone-200">
                <h4 class="text-sm font-bold text-stone-500 mb-3">💡 賞櫻小筆記</h4>
                <ul class="text-xs text-stone-600 space-y-3">
                    <li>🌸 沖繩櫻花是桃紅色的寒緋櫻。</li>
                    <li>🏮 今歸仁城跡夜櫻點燈通常於 18:00 開始。</li>
                    <li>🚙 名護中央公園櫻花祭期間人車較多，建議耐心慢行。</li>
                </ul>
            </section>
        </div>
    </main>

    <script>
        const tripData = [
            {
                day: 1, date: "1/28 WED", title: "落地與首戰採買",
                fullMap: "https://www.google.com/maps/dir/Naha+Airport/OTS+Rent-a-car+Rinku+Toyosaki/iias+Okinawa+Toyosaki/Yukureba+Maejima+Hotel",
                itinerary: [
                    { time: "17:05", loc: "那霸機場", desc: "抵達沖繩" },
                    { time: "19:15", loc: "OTS 臨空豐崎營業所", desc: "取車" },
                    { time: "19:30", loc: "iias 沖繩豐崎", desc: "買齊換洗衣物，2F UQ/GU 是目標" },
                    { time: "21:30", loc: "Yukureba Maejima Hotel", desc: "入住休息" }
                ],
                food: [
                    { name: "燒肉王 那霸小祿店", type: "吃到飽", note: "第一晚燒肉狂歡" },
                    { name: "傑克牛排 Jack's Steak House", type: "宵夜", note: "老牌名店，開到凌晨" },
                    { name: "暖暮拉麵 那霸牧志店", type: "拉麵", note: "經典豚骨，半夜常排隊" }
                ],
                backups: ["瀨長島 Umikaji Terrace", "DMM 水族館"],
                hotel: { name: "Yukureba Maejima Hotel", loc: "那霸市前島" },
                stats: [30, 70], tip: "第一晚雖然沒有櫻花，但先準備好保暖衣物很重要。"
            },
            {
                day: 2, date: "1/29 THU", title: "直線北上 ‧ 名護櫻花祭",
                fullMap: "https://www.google.com/maps/dir/Yukureba+Maejima+Hotel/American+Village/Kyoda+Rest+Area/Nago+Castle+Park/Nago+Pineapple+Park/Lieta+Nakayama",
                itinerary: [
                    { time: "11:00", loc: "美國村 American Village", desc: "異國風情拍照午餐" },
                    { time: "14:30", loc: "許田休息站", desc: "吃現炸甜甜圈" },
                    { time: "15:30", loc: "名護中央公園", desc: "🌸 賞櫻重點：名護櫻花祭主會場", sakura: true },
                    { time: "16:45", loc: "名護鳳梨園", desc: "就在飯店隔壁，搭造型小車" },
                    { time: "18:00", loc: "Lieta Nakayama", desc: "入住辦理" }
                ],
                food: [
                    { name: "燒肉王 名護店", type: "吃到飽", note: "名護市區，推薦「四大名物」" },
                    { name: "Kijimuna 塔可飯", type: "美國村", note: "歐姆蛋口味絕配" },
                    { name: "濱屋蕎麥麵 Hamaya", type: "沖繩麵", note: "軟骨豬肉麵神級口感" },
                    { name: "MaxValu 名護店", type: "超市", note: "買阿古豬回飯店煎" }
                ],
                backups: ["名護曲餐廳", "萬座毛"],
                hotel: { name: "Lieta Nakayama", loc: "名護市區北" },
                stats: [40, 60], tip: "名護城公園在櫻花祭期間非常壯觀，可以俯瞰整個名護灣。"
            },
            {
                day: 3, date: "1/30 FRI", title: "美麗海 ‧ 世界遺產夜櫻",
                fullMap: "https://www.google.com/maps/dir/Lieta+Nakayama/Okinawa+Churaumi+Aquarium/Kouri+Island/Nakijin+Castle+Ruins/Lieta+Nakayama",
                itinerary: [
                    { time: "12:00", loc: "美麗海水族館", desc: "🐋 待滿 4 小時完整觀賞黑潮之海" },
                    { time: "16:30", loc: "古宇利島", desc: "跨海大橋與心形岩夕陽" },
                    { time: "18:30", loc: "今歸仁城跡", desc: "🌸 賞櫻重點：世界遺產之上的粉紅夜櫻", sakura: true },
                    { time: "20:30", loc: "Lieta Nakayama", desc: "回飯店休息" }
                ],
                food: [
                    { name: "燒肉王 名護店", type: "吃到飽", note: "賞完櫻花大口吃肉" },
                    { name: "海人料理 海邦丸", type: "海鮮", note: "水族館旁最夯鮮魚丼" },
                    { name: "燒肉乃我那霸 名護店", type: "燒肉", note: "肉舖直營單點精品" },
                    { name: "古宇利島蝦蝦飯", type: "網紅", note: "蒜味蝦拼盤，有店面了" }
                ],
                backups: ["備瀨福木林道", "花人逢披薩"],
                hotel: { name: "Lieta Nakayama", loc: "名護市區北" },
                stats: [20, 80], tip: "今歸仁城跡的夜櫻點燈是沖繩一絕，千萬別錯過！"
            },
            {
                day: 4, date: "1/31 SAT", title: "海岸南下 ‧ 永旺 Costco",
                fullMap: "https://www.google.com/maps/dir/Lieta+Nakayama/Busena+Marine+Park/Manzamo/Aeon+Mall+Okinawa+Rycom/Costco+Wholesale+Okinawa+Nanjo/Hotel+Chula+Vista+SENAGA",
                itinerary: [
                    { time: "10:30", loc: "部瀨名海中公園", desc: "搭鯨魚底船看珊瑚礁" },
                    { time: "12:00", loc: "萬座毛", desc: "象鼻岩打卡快閃" },
                    { time: "14:00", loc: "永旺夢樂城來客夢", desc: "沖繩最大商城狂逛" },
                    { time: "19:15", loc: "Costco 沖繩南城店", desc: "買握壽司/烤雞晚餐" },
                    { time: "20:45", loc: "Hotel Chula Vista SENAGA", desc: "南部入住休息" }
                ],
                food: [
                    { name: "A&W 漢堡 Rycom店", type: "特色", note: "沖繩代表性口味 Root Beer" },
                    { name: "恩納之驛 休息站", type: "在地", note: "炸海鮮串與刨冰" },
                    { name: "Costco 熟食大餐", type: "便利", note: "買回飯店開烤雞派對" }
                ],
                backups: ["殘波岬", "美國村二訪"],
                hotel: { name: "Hotel Chula Vista SENAGA", loc: "豐見城市" },
                stats: [45, 55], tip: "今天以移動和購物為主，記得 Costco 只收 Mastercard。"
            },
            {
                day: 5, date: "2/1 SUN", title: "南部賞櫻 ‧ 燒肉王狂歡",
                fullMap: "https://www.google.com/maps/dir/Hotel+Chula+Vista+SENAGA/Okinawa+World/八重瀬公園/Don+Quijote+Itoman/Hotel+Chula+Vista+SENAGA",
                itinerary: [
                    { time: "10:30", loc: "玉泉洞 (沖繩世界)", desc: "壯觀鐘乳石洞與國王村" },
                    { time: "13:30", loc: "八重瀬公園", desc: "🌸 賞櫻備案：南部的櫻花祭會場", sakura: true },
                    { time: "17:30", loc: "唐吉訶德 糸滿店", desc: "伴手禮藥妝大採購" },
                    { time: "20:00", loc: "燒肉王 豐見城店", desc: "飯店旁的最後燒肉狂歡" }
                ],
                food: [
                    { name: "燒肉王 豐見城店", type: "吃到飽", note: "離飯店超近，最後一晚必衝" },
                    { name: "系滿漁市場", type: "海鮮", note: "買干貝海膽墊墊胃" },
                    { name: "幸福鬆餅 瀨長島店", type: "甜點", note: "海景配超軟鬆餅" }
                ],
                backups: ["知念岬公園", "奧武島中本天婦羅"],
                hotel: { name: "Hotel Chula Vista SENAGA", loc: "豐見城市" },
                stats: [30, 70], tip: "燒肉王豐見城店生意極好，強烈建議先 APP 預約。"
            },
            {
                day: 6, date: "2/2 MON", title: "那霸最後補貨 ‧ 還車",
                fullMap: "https://www.google.com/maps/dir/Hotel+Chula+Vista+SENAGA/Naminoue+Shrine/Kokusai+Dori/OTS+Rent-a-car+Rinku+Toyosaki",
                itinerary: [
                    { time: "10:00", loc: "波上宮", desc: "參拜神社與海灘最後留影" },
                    { time: "12:00", loc: "國際通", desc: "最後伴手禮補齊" },
                    { time: "15:00", loc: "OTS 臨空豐崎營業所", desc: "準時還車前加滿油" }
                ],
                food: [
                    { name: "第一牧志公設市場", type: "熱炒", note: "在地廚房的沖繩味" },
                    { name: "琉球茶房 Ashibiuna", type: "老宅", note: "緣廊吃豬腳定食，氛圍滿分" }
                ],
                backups: ["首里城"],
                hotel: { name: "那霸機場", loc: "回家歸途" },
                stats: [20, 80], tip: "還車點在豐崎，剛好也是買衣服的地方。"
            }
        ];

        let currentDayIdx = 0;
        let paceChart = null;

        const getSearchUrl = (query) => `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query + " 沖繩")}`;

        function updateApp(idx) {
            currentDayIdx = idx;
            const data = tripData[idx];
            document.getElementById('current-date').innerText = data.date;
            document.getElementById('daily-full-map').href = data.fullMap;
            document.getElementById('pace-tip').innerText = data.tip;
            renderNav();
            renderItinerary(data.itinerary);
            renderFood(data.food);
            renderBackup(data.backups);
            renderHotel(data.hotel);
            updateChart(data.stats);
        }

        function renderNav() {
            const container = document.getElementById('day-nav');
            container.innerHTML = tripData.map((d, i) => `
                <button onclick="updateApp(${i})" class="nav-tab flex-shrink-0 px-6 py-2 rounded-2xl text-sm font-bold transition-all ${i === currentDayIdx ? 'active' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}">
                    Day ${d.day}
                </button>
            `).join('');
        }

        function renderItinerary(list) {
            const container = document.getElementById('itinerary-list');
            container.innerHTML = list.map(item => `
                <div class="relative">
                    <div class="absolute -left-[24px] top-1 w-4 h-4 rounded-full ${item.sakura ? 'bg-pink-500 animate-pulse' : 'bg-blue-500'} border-2 border-white shadow-sm"></div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-mono font-bold ${item.sakura ? 'text-pink-600' : 'text-blue-600'} bg-white px-2 py-0.5 rounded border border-slate-100">${item.time}</span>
                        <a href="${getSearchUrl(item.loc)}" target="_blank" class="location-link font-bold text-slate-800 flex items-center">
                            ${item.loc} ${item.sakura ? '<span class="sakura-tag">🌸 櫻花點</span>' : ''}
                        </a>
                    </div>
                    <p class="text-xs text-slate-400 mt-1 ml-1">${item.desc}</p>
                </div>
            `).join('');
        }

        function renderFood(list) {
            const container = document.getElementById('food-grid');
            container.innerHTML = list.map(f => `
                <a href="${getSearchUrl(f.name)}" target="_blank" class="p-4 bg-white/5 rounded-2xl border border-white/10 hover:bg-white/20 transition-all group">
                    <div class="flex justify-between items-start">
                        <span class="font-bold text-orange-400 text-sm group-hover:underline">${f.name}</span>
                        <span class="text-[9px] bg-white/10 px-2 py-0.5 rounded text-slate-400 font-bold uppercase">${f.type}</span>
                    </div>
                    <p class="text-[11px] text-slate-300 mt-2">${f.note}</p>
                </a>
            `).join('');
        }

        function renderBackup(list) {
            const container = document.getElementById('backup-list');
            container.innerHTML = list.map(b => `
                <a href="${getSearchUrl(b)}" target="_blank" class="bg-white p-3 rounded-xl text-xs font-bold text-slate-500 flex items-center justify-between hover:bg-pink-50 hover:text-pink-600 transition-all border border-pink-50">
                    <span>📍 ${b}</span>
                    <span class="text-[10px] font-normal opacity-50">🔗 導航</span>
                </a>
            `).join('');
        }

        function renderHotel(hotel) {
            const container = document.getElementById('hotel-info-card');
            container.innerHTML = `
                <div class="flex items-center gap-4 mb-4">
                    <div class="bg-white/20 p-3 rounded-2xl text-2xl"><span>🏠</span></div>
                    <div>
                        <h4 class="font-bold text-lg">今日入住飯店</h4>
                        <p class="text-blue-100 text-xs">地點：${hotel.loc}</p>
                    </div>
                </div>
                <a href="${getSearchUrl(hotel.name)}" target="_blank" class="block bg-white/10 hover:bg-white/20 p-3 rounded-xl border border-white/20 group transition-all">
                    <p class="font-bold text-sm flex items-center justify-between">${hotel.name} <span class="text-[10px] font-normal opacity-70 italic">點我導航</span></p>
                </a>
            `;
        }

        function updateChart(stats) {
            const ctx = document.getElementById('paceChart').getContext('2d');
            if (paceChart) paceChart.destroy();
            paceChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [stats[0], stats[1]],
                        backgroundColor: ['#e2e8f0', '#ff4d6d'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } } }
            });
        }

        function pickRandomFood() {
            const foods = tripData[currentDayIdx].food;
            const random = foods[Math.floor(Math.random() * foods.length)];
            const msg = document.createElement('div');
            msg.className = "fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-900 text-white p-8 rounded-3xl shadow-2xl z-[100] text-center border-t-4 border-orange-500";
            msg.innerHTML = `<p class="text-xs uppercase font-bold text-orange-400 mb-2">系統今日為您挑選：</p><p class="text-2xl font-bold mb-6">${random.name}</p><button onclick="window.open('${getSearchUrl(random.name)}', '_blank'); this.parentElement.remove();" class="bg-orange-500 text-white px-6 py-2 rounded-full font-bold">立即導航前往</button><br><button onclick="this.parentElement.remove()" class="mt-4 text-[10px] text-slate-500 underline">取消</button>`;
            document.body.appendChild(msg);
        }

        document.getElementById('toggle-backup').onclick = () => {
            const list = document.getElementById('backup-list');
            list.classList.toggle('hidden');
        };

        window.onload = () => updateApp(0);
    </script>
</body>
</html>
